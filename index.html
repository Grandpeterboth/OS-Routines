<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>OS Routines</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="icon.png" type="image/png">
  <meta name="theme-color" content="#0052FF">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <header>
    <div class="header-top">
      <div class="header-title" id="display-date">Aujourd'hui</div>
      <button class="icon-btn" onclick="app.showBackupModal()" title="Sauvegarde/Restauration">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      </button>
    </div>
    <div class="progress-container">
      <div class="progress-bar" id="progress-bar"></div>
    </div>
    <div class="progress-text" id="progress-text">0% complété</div>
  </header>

  <main>
    <!-- View: Today -->
    <div id="view-today" class="view-section active">
      <div id="today-container"></div>
    </div>

    <!-- View: All -->
    <div id="view-all" class="view-section">
      <div id="all-container"></div>
    </div>

    <!-- View: Manage -->
    <div id="view-manage" class="view-section">
      <div class="segmented-control">
        <button class="seg-btn active" id="seg-routines" onclick="app.switchManageTab('routines')">Routines</button>
        <button class="seg-btn" id="seg-categories" onclick="app.switchManageTab('categories')">Rubriques</button>
      </div>

      <!-- Manage Routines -->
      <div id="manage-routines-section">
        <button class="btn primary" onclick="app.showRoutineModal()" style="margin-bottom: 1.5rem;">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Nouvelle Routine
        </button>
        <div id="manage-routines-container"></div>
      </div>

      <!-- Manage Categories -->
      <div id="manage-categories-section" style="display: none;">
        <button class="btn primary" onclick="app.showCategoryModal()" style="margin-bottom: 1.5rem;">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Nouvelle Rubrique
        </button>
        <div id="manage-categories-container"></div>
      </div>
    </div>
  </main>

  <!-- Bottom Navigation -->
  <nav>
    <button class="nav-item active" onclick="app.switchTab('today')">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><path d="m9 16 2 2 4-4"/></svg>
      Aujourd'hui
    </button>
    <button class="nav-item" onclick="app.switchTab('all')">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      Voir Tout
    </button>
    <button class="nav-item" onclick="app.switchTab('manage')">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
      Gestion
    </button>
  </nav>

  <!-- Modal: Edit/Add Routine -->
  <div class="modal-overlay" id="modal-routine">
    <div class="modal-content">
      <h2 class="modal-title" id="modal-routine-title">Nouvelle Routine</h2>
      <input type="hidden" id="form-routine-id">
      
      <div class="form-group">
        <label for="form-routine-name">Nom de la tâche</label>
        <input type="text" id="form-routine-name" class="form-control" placeholder="Ex: Faire la vaisselle">
      </div>
      
      <div class="form-group">
        <label for="form-routine-cat">Rubrique</label>
        <select id="form-routine-cat" class="form-control">
          <!-- Dynamically populated -->
        </select>
      </div>
      
      <div class="form-group">
        <label>Jours de récurrence</label>
        <div class="days-selector" id="form-routine-days">
          <button type="button" class="day-btn" data-day="1">L</button>
          <button type="button" class="day-btn" data-day="2">M</button>
          <button type="button" class="day-btn" data-day="3">M</button>
          <button type="button" class="day-btn" data-day="4">J</button>
          <button type="button" class="day-btn" data-day="5">V</button>
          <button type="button" class="day-btn" data-day="6">S</button>
          <button type="button" class="day-btn" data-day="0">D</button>
        </div>
      </div>
      
      <div class="modal-actions">
        <button class="btn secondary" onclick="app.closeModal('modal-routine')">Annuler</button>
        <button class="btn primary" onclick="app.saveRoutine()">Enregistrer</button>
      </div>
    </div>
  </div>

  <!-- Modal: Edit/Add Category -->
  <div class="modal-overlay" id="modal-category">
    <div class="modal-content">
      <h2 class="modal-title" id="modal-cat-title">Nouvelle Rubrique</h2>
      <input type="hidden" id="form-cat-id">
      
      <div class="form-group">
        <label for="form-cat-name">Nom de la rubrique</label>
        <input type="text" id="form-cat-name" class="form-control" placeholder="Ex: Sport, Administration...">
      </div>
      
      <div class="form-group">
        <label>Couleur</label>
        <div class="color-grid" id="color-grid">
          <!-- Dynamically populated -->
        </div>
        <input type="hidden" id="form-cat-color">
      </div>
      
      <div class="form-group">
        <label>Icône ou Photo</label>
        <div class="icon-grid" id="icon-grid">
          <!-- Dynamically populated -->
        </div>
        
        <div style="margin-top: 1rem; text-align: center;">
          <input type="file" id="cat-photo-upload" accept="image/*" style="display:none" onchange="app.handlePhotoUpload(event)">
          <button class="btn secondary" onclick="document.getElementById('cat-photo-upload').click()">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
            Choisir une photo depuis la galerie
          </button>
          <div id="photo-preview-container" style="display: none; margin-top: 10px;">
            <img id="photo-preview" src="" alt="Aperçu" style="width: 50px; height: 50px; border-radius: 50%; object-fit: cover; border: 2px solid var(--border-color);">
            <input type="hidden" id="form-cat-photo-data">
          </div>
        </div>
        <input type="hidden" id="form-cat-icon-type">
        <input type="hidden" id="form-cat-icon-val">
      </div>
      
      <div class="modal-actions">
        <button class="btn secondary" onclick="app.closeModal('modal-category')">Annuler</button>
        <button class="btn primary" onclick="app.saveCategory()">Enregistrer</button>
      </div>
    </div>
  </div>

  <!-- Modal: Backup/Restore -->
  <div class="modal-overlay" id="modal-backup">
    <div class="modal-content">
      <h2 class="modal-title">Sauvegarde / Restauration</h2>
      
      <div class="form-group">
        <label for="backup-data">Données JSON</label>
        <textarea id="backup-data" class="form-control" rows="8" placeholder="Collez ici les données à restaurer..."></textarea>
      </div>
      
      <div class="modal-actions">
        <button class="btn secondary" onclick="app.closeModal('modal-backup')">Fermer</button>
        <button class="btn primary" onclick="app.copyBackup()">Copier</button>
        <button class="btn secondary" style="background:#ef4444;color:white;" onclick="app.restoreBackup()">Restaurer</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js')
        .then(() => console.log("Service Worker enregistré"))
        .catch(err => console.error("Erreur Service Worker:", err));
    }
  </script>
</body>
</html>
